type_id: REPORT_OUTPUT
description: "Generate Excel report with tabs & highlights"

ui:
  color: "#047857"
  icon: FileSpreadsheet
  config_tags: [output_name]
  palette:
    section:
      id: output
      label: Output
      order: 60
      color: "#10B981"
    node_order: 60

input_ports:
  - name: datasets
    type: object
    description: "All DataFrames to include as tabs (ctx.datasets)."
  - name: sections
    type: object
    description: "Section narratives for the Section Summaries sheet."
    optional: true
  - name: executive_summary
    type: text
    description: "Executive summary text."
    optional: true
  - name: context
    type: object
    description: "disposition, trader_id, currency_pair etc. used on the cover page."
    optional: true

output_ports:
  - name: report_path
    type: text
    store_at: "ctx.report_path"
    description: "Absolute path to the written .xlsx file. Stored as context.report_path."

params:
  - name: output_path
    type: string
    description: "File path for the Excel output (e.g. 'output/report.xlsx')."
    required: true
  - name: tabs
    type: array
    description: >-
      Array of tab specs. Each tab is one of:

      • Static tab — {name, dataset, include_highlights?}.
        Renders the named dataset under the given sheet name.

      • Expanded tab — {expand_from, as?, name, dataset, include_highlights?}.
        `expand_from` is a single `{ref}` resolving to a list, dict,
        Series, or MAP-result. One tab is emitted per item, with the
        item bound under `as` (default `item`) and substituted into both
        `name` and `dataset` templates via `.format_map`. Examples:

          expand_from: "{context.book_list}"
          as: book
          name: "Executions · {book}"
          dataset: "executions_{book}"

          expand_from: "{per_book.results}"   # MAP result dict
          as: key
          name: "Per-book {key}"
          dataset: "per_book_{key}_executions"

      When `tabs` is empty, all context.datasets are included as
      auto-named tabs.
    default: []
    required: false
semantics:
  requires: []

constraints:
  - "Tab names truncated to 31 characters (Excel limit)."
  - "Datetime columns converted to strings automatically."
  - "List/dict cell values stringified automatically."
  - "If include_highlights=true, uses dataset_name + '_highlighted' if it exists."
  - "Must be the final node in the workflow."
