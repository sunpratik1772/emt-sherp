type_id: ALERT_TRIGGER
description: "Entry point — binds alert payload to context"

ui:
  color: "#7C3AED"
  icon: Siren
  palette:
    section:
      id: trigger
      label: Trigger
      order: 0
      color: "#F5A623"
    node_order: 0

input_ports:
  - name: alert_payload
    type: object
    description: "JSON object passed at workflow invocation time."

output_ports:
  - name: context_keys
    type: object
    store_at: "ctx.values[context_keys]"
    description: >-
      One context key per declared alert_field, e.g. trader_id, book,
      alert_date, currency_pair, alert_id.

params:
  - name: alert_fields
    type: object
    description: >-
      Map of field_name → type (string|date|number). Non-listed payload keys
      in extras.standard_alert_fields are still bound when present in the alert.
    default: {}
    required: false
    widget: json

# Authoritative list — handler reads only this (no Python duplicate tuple).
extras:
  standard_alert_fields:
    - trader_id
    - book
    - alert_date
    - currency_pair
    - alert_id
    - entity
    - desk

semantics:
  requires: []

constraints:
  - "Must be the first node (id=n01)."
  - "No dataset inputs or outputs."
