type_id: SIGNAL_CALCULATOR
description: "Compute signals — always outputs 5 columns"

ui:
  color: "#DC2626"
  icon: Signal
  config_tags: [signal_type, output_name]
  palette:
    section:
      id: signal
      label: Signal
      order: 30
      color: "#F472B6"
    node_order: 30

input_ports:
  - name: dataset
    type: dataframe
    description: "Trade/execution DataFrame (typically after NORMALISE_ENRICH)."

output_ports:
  - name: signals
    type: dataframe
    description: >-
      Input DataFrame + exactly 5 signal columns: _signal_flag (bool),
      _signal_score (float in [0, 1] — same scale as DECISION_RULE.score),
      _signal_reason (str), _signal_type (str), _signal_window (str).
    required_columns:
      - _signal_flag
      - _signal_score
      - _signal_reason
      - _signal_type
      - _signal_window
  - name: flag_count
    type: scalar
    description: "Number of rows where _signal_flag == True. Stored as {output_name}_flag_count."
    optional: true

params:
  - name: mode
    type: enum
    description: "How the signal is computed."
    enum: [configure, upload_script]
    default: configure
    required: true
  - name: signal_type
    type: enum
    description: "Built-in signal family (configure mode only)."
    enum: [FRONT_RUNNING, WASH_TRADE, SPOOFING, LAYERING]
    required: false
  - name: input_name
    type: input_ref
    description: "Source dataset name (an upstream output_name)."
    required: true
  - name: output_name
    type: string
    description: "Output dataset name."
    required: true
  - name: params
    type: object
    description: "Signal-specific parameters (overrides built-in defaults)."
    default: {}
    required: false
  - name: script_path
    type: string
    description: "Path to custom Python script (upload_script mode)."
    required: false
  - name: script_content
    type: code
    description: "Inline Python snippet operating on local variable `df` (upload_script mode)."
    required: false

semantics:
  requires: []

constraints:
  - "ALWAYS outputs exactly these 5 columns: _signal_flag, _signal_score, _signal_reason, _signal_type, _signal_window."
  - "Missing signal columns are auto-filled with defaults (False, 0.0, '', '', '')."
  - "Custom scripts must operate on local variable 'df' and leave result in 'df'."

extras:
  signal_output_columns:
    - _signal_flag
    - _signal_score
    - _signal_reason
    - _signal_type
    - _signal_window
  built_in_signal_params:
    FRONT_RUNNING:
      window_minutes: 5
      price_move_threshold: 0.0003
    WASH_TRADE:
      window_minutes: 10
      ratio_threshold: 0.8
    SPOOFING:
      cancel_ratio_threshold: 0.7
      window: "1d"
    LAYERING:
      min_layers: 5
      window: "30m"
