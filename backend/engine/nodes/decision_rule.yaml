type_id: DECISION_RULE
description: "Evaluate flag_count or rules → ESCALATE/REVIEW/DISMISS + severity"

ui:
  color: "#D97706"
  icon: Gavel
  palette:
    section:
      id: rule
      label: Rule
      order: 40
      color: "#FBBF24"
    node_order: 40

input_ports:
  - name: dataset
    type: dataframe
    description: "Signal DataFrame with _signal_flag column."
    required_columns:
      - _signal_flag
  - name: flag_count
    type: scalar
    description: >-
      Flag count from SIGNAL_CALCULATOR (read from
      ctx.values[{input_name}_flag_count] if the dataset isn't available).
    optional: true

output_ports:
  - name: disposition
    type: text
    store_at: "ctx.disposition"
    description: "'ESCALATE' | 'REVIEW' | 'DISMISS'. Stored as context.disposition."
  - name: severity
    type: text
    description: "'CRITICAL' | 'HIGH' | 'MEDIUM' | 'LOW'. Stored as context.severity."
  - name: score
    type: scalar
    description: "Normalised severity score in [0, 1]. Stored as context.score."
  - name: flag_count
    type: scalar
    store_at: "ctx.values[flag_count]"
    description: "Total signal hits (int). Stored as context.flag_count."
  - name: output_branch
    type: text
    store_at: "ctx.output_branch"
    description: "Branch name to route to. Stored as context.output_branch."
  - name: matched_rule
    type: text
    description: >-
      Name of the rule that fired (rule mode only; empty in threshold
      mode). Stored as context.matched_rule.

params:
  - name: input_name
    type: input_ref
    description: "Signal dataset name."
    required: true
  - name: escalate_threshold
    type: integer
    description: "flag_count >= this → ESCALATE (threshold mode)."
    default: 1
    required: false
  - name: review_threshold
    type: integer
    description: "flag_count >= this → REVIEW (threshold mode)."
    default: 1
    required: false
  - name: rules
    type: array
    description: >-
      Optional rules list, evaluated top-to-bottom; first match wins.
      Each rule: {name, when, severity?, disposition?}. `when` accepts
      `{ref}` (truthy test) or `{ref} OP literal` where OP ∈
      {>=,<=,==,!=,>,<}. Refs use the cross-dataset grammar — e.g.
      `{executions._signal_flag.sum} >= 10`,
      `{ladder.symmetry.max} > 0.85`, `{context.book_count} > 1`.
    default: []
    required: false
  - name: severity_map
    type: object
    description: >-
      Override severity per disposition. Defaults:
      {ESCALATE: HIGH, REVIEW: MEDIUM, DISMISS: LOW}.
    default: {}
    required: false
  - name: output_branches
    type: object
    description: "Map of disposition → branch_name string."
    default: {}
    required: false

semantics:
  requires: []

constraints:
  - "Threshold mode (default) requires escalate_threshold >= review_threshold."
  - "Rule mode short-circuits: first matching rule sets disposition + severity."
