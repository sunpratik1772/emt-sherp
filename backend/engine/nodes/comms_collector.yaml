type_id: COMMS_COLLECTOR
description: "Query Oculus comms with keyword scanning"

ui:
  color: "#059669"
  icon: MessageSquareText
  config_tags: [output_name]
  display_name: Oculus
  palette:
    section:
      id: integrations
      label: Integrations
      order: 10
      color: "#00E5FF"
    node_order: 10

input_ports:
  - name: context
    type: object
    description: "Context keys referenced in query_template as {context.xxx}."
    optional: true

output_ports:
  - name: comms
    type: dataframe
    store_at: "ctx.datasets[{output_name}]"
    description: >-
      DataFrame with columns: user, timestamp, display_post, event_type,
      _keyword_hit, _matched_keywords. Stored under ctx.datasets[output_name].
    required_columns:
      - user
      - timestamp
      - display_post
      - event_type
      - _keyword_hit
      - _matched_keywords
  - name: keyword_hit_count
    type: scalar
    store_at: "ctx.values[{output_name}_keyword_hits]"
    description: "Total keyword hit count (int). Stored as {output_name}_keyword_hits."
    optional: true

params:
  - name: query_template
    type: string
    description: "Oculus query with {context.xxx} placeholders."
    required: true
    widget: textarea
  - name: keywords
    type: string_list
    description: "Terms to scan in display_post."
    default: []
    required: false
  - name: keyword_categories
    type: object
    description: >-
      Optional {category: [kw1, kw2, ...]} map. When present, each row
      gains a _matched_categories list plus one _hit_<cat> boolean column.
      Combined with plain `keywords` (both are scanned).
    default: {}
    required: false
  - name: emit_hits_only
    type: boolean
    description: >-
      Also publish ctx.datasets[f"{output_name}_hits"] containing only rows
      with at least one keyword match. Lets downstream SECTION_SUMMARY
      narrate just the suspicious subset.
    default: false
    required: false
  - name: output_name
    type: string
    description: "Dataset name in ctx.datasets."
    default: comms
    required: true
  - name: mock_csv_path
    type: string
    description: >-
      Demo-mode override: path to a CSV used verbatim instead of the synthetic
      generator. Ignored if the file is missing.
    default: ""
    required: false

semantics:
  requires: [trader, time]

constraints:
  - "Always adds _keyword_hit (boolean) and _matched_keywords (list[str]) columns."
  - "Scans display_post field only."
